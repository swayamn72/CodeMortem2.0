# CodeMortem Docker Compose - Development
version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: codemortem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codemortem
      POSTGRES_PASSWORD: codemortem_dev_2026
      POSTGRES_DB: codemortem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemortem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: codemortem-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Judge0 - Code Execution Engine
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: codemortem-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    environment:
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=judge0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0_dev
      - RAILS_MAX_THREADS=8
      - RAILS_SERVER_URL=http://0.0.0.0:2358
      - CGROUP_VERSION=2
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-postgres:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  # Judge0 Workers
  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: codemortem-judge0-workers
    restart: unless-stopped
    command: ["./scripts/workers"]
    environment:
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=judge0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0_dev
      - CGROUP_VERSION=2
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-postgres:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  # Judge0's own PostgreSQL
  judge0-postgres:
    image: postgres:16-alpine
    container_name: codemortem-judge0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_dev
      POSTGRES_DB: judge0
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Judge0's own Redis
  judge0-redis:
    image: redis:7-alpine
    container_name: codemortem-judge0-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CodeMortem API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemortem-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=codemortem
      - DB_PASSWORD=codemortem_dev_2026
      - DB_NAME=codemortem
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JUDGE0_URL=http://judge0-server:2358
      - JWT_ACCESS_SECRET=8f3c2e1b7a9d4c6f0e5a2b8d1c7f9e4a6b3d0c8e1f5a7b9c2d4e6f8a1b3c5d7
      - JWT_REFRESH_SECRET=4d9a1c7e3b6f0a2d8c5e1f9b7a4c6d3e0f2a8b1c7e5d9f4a6b3c0e2d8f1a7c5
      - AI_PROVIDER=openai
      - AI_API_KEY=sk-proj-YOUR_API_KEY_HERE
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # CodeMortem Web Frontend
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codemortem-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  judge0_postgres_data:
  judge0_redis_data:
